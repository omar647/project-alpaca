[theme]
base = "dark"
primaryColor = "#00e5a0"
backgroundColor = "#0a0d13"
secondaryBackgroundColor = "#10141d"
textColor = "#e8ebf2"
font = "sans serif"

[server]
headless = true

[client]
# Keep the hamburger (⋮) menu, but drop the "Deploy" button and the
# developer/backend options (Deploy this app, Clear cache, etc.).
toolbarMode = "viewer"
